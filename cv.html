<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ami Song — CV</title>
<style>
  html, body { margin: 0; padding: 0; background: #525659; min-height: 100%; }
  #pages { padding: 20px 0 40px; }
  #pages canvas {
    display: block; margin: 0 auto 18px; max-width: calc(100% - 24px);
    height: auto; box-shadow: 0 2px 18px rgba(0,0,0,0.35); border-radius: 2px;
  }
  #msg, .fallback {
    color: #fff; text-align: center; padding: 48px 24px;
    font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; font-size: 15px;
  }
  #msg a, .fallback a {
    color: #fff; font-weight: 600; text-decoration: none;
    border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; padding: 10px 18px;
    display: inline-block; margin-top: 12px;
  }
</style>
</head>
<body>
  <div id="pages"></div>
  <div id="msg">Loading CV…</div>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    (function () {
      var msg = document.getElementById('msg');
      var pagesEl = document.getElementById('pages');
      var PDF = '/AmiSong_CV.pdf';
      var settled = false;

      function fallback() {
        if (settled) return; settled = true;
        document.body.innerHTML =
          '<object data="' + PDF + '" type="application/pdf" style="border:0;width:100%;height:100vh;display:block;">' +
          '<div class="fallback"><p>Preview isn\'t available in this browser.</p>' +
          '<a href="' + PDF + '">Open the CV (PDF) &rarr;</a></div></object>';
      }

      // Never stay stuck on "Loading CV…": fall back after 4s
      var timer = setTimeout(fallback, 4000);

      if (!window.pdfjsLib) { clearTimeout(timer); fallback(); return; }
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
      var dpr = Math.min(window.devicePixelRatio || 1, 2);

      pdfjsLib.getDocument(PDF).promise.then(function (pdf) {
        if (settled) return; settled = true; clearTimeout(timer); msg.style.display = 'none';
        var chain = Promise.resolve();
        for (var i = 1; i <= pdf.numPages; i++) {
          (function (n) {
            chain = chain.then(function () {
              return pdf.getPage(n).then(function (page) {
                var vp = page.getViewport({ scale: 1.5 * dpr });
                var canvas = document.createElement('canvas');
                canvas.width = vp.width; canvas.height = vp.height;
                canvas.style.width = (vp.width / dpr) + 'px';
                pagesEl.appendChild(canvas);
                return page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
              });
            });
          })(i);
        }
      }).catch(function () { clearTimeout(timer); fallback(); });
    })();
  </script>
</body>
</html>
